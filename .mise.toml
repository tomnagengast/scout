[tools]
go = "1.26.3"

[tasks.fmt]
description = "Format Go source"
run = "gofmt -w ./cmd ./internal"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.build]
description = "Build the scout binary"
run = '''
version="${SCOUT_VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || true)"
date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
go build \
  -ldflags "-X github.com/tomnagengast/scout/internal/version.Version=${version} -X github.com/tomnagengast/scout/internal/version.Commit=${commit} -X github.com/tomnagengast/scout/internal/version.Date=${date}" \
  -o ./scout \
  ./cmd
'''

[tasks.install-local]
description = "Install scout binary to ~/.local/bin"
run = '''
version="${SCOUT_VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || true)"
date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
go build \
  -ldflags "-X github.com/tomnagengast/scout/internal/version.Version=${version} -X github.com/tomnagengast/scout/internal/version.Commit=${commit} -X github.com/tomnagengast/scout/internal/version.Date=${date}" \
  -o ./scout \
  ./cmd

mkdir -p "${HOME}/.local/bin"
tmp="${HOME}/.local/bin/scout.new"
cp ./scout "${tmp}"
chmod 755 "${tmp}"
mv "${tmp}" "${HOME}/.local/bin/scout"

echo "Installed: ${HOME}/.local/bin/scout"
'''

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"
