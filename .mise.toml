[tools]
go = "1.26.3"
goreleaser = "latest"
gh = "latest"
direnv = "latest"
worktrunk = "latest"

[tasks.fmt]
description = "Format Go source"
run = "gofmt -w ./cmd ./internal"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.build]
description = "Build the scout binary"
run = '''
version="${SCOUT_VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || true)"
date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
go build \
  -ldflags "-X github.com/tomnagengast/scout/internal/version.Version=${version} -X github.com/tomnagengast/scout/internal/version.Commit=${commit} -X github.com/tomnagengast/scout/internal/version.Date=${date}" \
  -o ./scout \
  ./cmd
'''

[tasks.install-local]
description = "Install scout binary to ~/.local/bin"
run = '''
version="${SCOUT_VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || true)"
date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
go build \
  -ldflags "-X github.com/tomnagengast/scout/internal/version.Version=${version} -X github.com/tomnagengast/scout/internal/version.Commit=${commit} -X github.com/tomnagengast/scout/internal/version.Date=${date}" \
  -o ./scout \
  ./cmd

mkdir -p "${HOME}/.local/bin"
tmp="${HOME}/.local/bin/scout.new"
cp ./scout "${tmp}"
chmod 755 "${tmp}"
mv "${tmp}" "${HOME}/.local/bin/scout"

echo "Installed: ${HOME}/.local/bin/scout"
'''

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"

[tasks.release-check]
description = "Run local checks for a tagged GoReleaser/Homebrew release"
depends = ["test", "build"]
run = "goreleaser check"

[tasks.doctor]
description = "Check repo toolchain and agent helper CLIs"
run = '''
missing=0
for tool in mise direnv wt gh goreleaser; do
  if command -v "${tool}" >/dev/null 2>&1; then
    printf "%-12s %s\n" "${tool}" "$(command -v "${tool}")"
  else
    printf "%-12s missing\n" "${tool}"
    missing=1
  fi
done

if command -v memoryd >/dev/null 2>&1; then
  printf "%-12s %s\n" "memoryd" "$(command -v memoryd)"
else
  printf "%-12s optional; unavailable for durable agent memory in this shell\n" "memoryd"
fi

exit "${missing}"
'''
